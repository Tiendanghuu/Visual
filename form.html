<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form nhân sự</title>
    <link rel="stylesheet" href="CSS/style.css">
<head>
</body>
    <div class="header">
        PHIẾU THÔNG TIN NGHỈ VIỆC
    </div>
    <div class="form-box">
        <form>
            <label>Họ và tên</label>
            <div class="name-row">
                <div>
                    <input type="text" placeholder="Họ và tên đệm">
                </div>
                <div>
                    <input type="text" placeholder="Tên">
                </div>
            </div>
                <div>
                    <label>Mã nhân viên</label>
                </div>
                <div>
                    <input type="text" placeholder="ID">
                </div> 
                <div>
                    <label>Email cá nhân</label>
                </div>
                <div><input type="email" placeholder="Email">
                </div>
                <div>
                    <label>Ngày làm việc cuối cùng</label>
                </div>
                <div><input type="date" placeholder="dd-MM-yyyy">
                </div>
                <div><label>Lý do nghỉ việc</label>
                </div>
                <div><input type="text"></div>
                <div><label>Tình trạng bàn giao tài sản công ty</label></div>
                <div class="radio-box">
                    <input type="radio" name="property"> Đã bàn giao
                </div>
                <div class="radio-box">
                    <input type="radio" name="property"> Chưa bàn giao
                </div>
                <div class="radio-box">
                    <input type="radio" name="property"> Khác
                </div>
                <div><label>Lịch phỏng vấn trước khi nghỉ việc</label></div>
                <input type="datetime-local">
                <div><label>Ý kiến đóng góp / phản hồi</label></div>
                <textarea></textarea>
            <div class="btn">
                <button type="submit">Submit</button>
            </div>
        </form>
    </div>
</body>
</html>
